# Weekly dependency audit + on pushes that change dependencies.
# Catches known high/critical vulnerabilities in npm packages.

name: Dependency Audit

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
