# End-to-end tests using Playwright against a local Supabase instance.
# Manual trigger only. Enable the pull_request trigger once E2E tests are stable.

name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      all_browsers:
        description: "Run all browsers (chromium, firefox, webkit)? Default: chromium only."
        type: boolean
        default: false
  # Uncomment when E2E tests exist and are stable:
  # pull_request:
  #   branches: [main]

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Well-known Supabase CLI local dev keys (deterministic, not secrets).
      # See: https://supabase.com/docs/guides/local-development
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_BASE_DOMAIN: localhost
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Install Playwright browsers
        run: |
          if [ "${{ inputs.all_browsers }}" = "true" ]; then
            npx playwright install --with-deps chromium firefox webkit
          else
            npx playwright install --with-deps chromium
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Seed database
        run: npx tsx seed.ts
        env:
          FORCE_LOCAL_DB: "1"

      - name: Build Next.js
        run: npm run build

      - name: Start server
        run: npm run start &

      - name: Wait for server
        run: timeout 30 bash -c 'until curl -s http://localhost:3000 > /dev/null 2>&1; do sleep 1; done'

      - name: Run Playwright tests
        run: |
          if [ "${{ inputs.all_browsers }}" = "true" ]; then
            npx playwright test
          else
            npx playwright test --project=chromium
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
