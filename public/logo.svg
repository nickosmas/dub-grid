<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <style>
    .cell { fill: #005F02; }
    @media (prefers-color-scheme: dark) {
      .cell { fill: #F1F5F9; }
    }
  </style>

  <!-- Row 0 (top) — all full opacity -->
  <rect class="cell" x="3.2" y="3.2" width="25.6" height="25.6" rx="6.4" opacity="1"/>
  <rect class="cell" x="35.2" y="3.2" width="25.6" height="25.6" rx="6.4" opacity="1"/>
  <rect class="cell" x="67.2" y="3.2" width="25.6" height="25.6" rx="6.4" opacity="1"/>
  <rect class="cell" x="99.2" y="3.2" width="25.6" height="25.6" rx="6.4" opacity="1"/>

  <!-- Row 1 -->
  <rect class="cell" x="3.2" y="35.2" width="25.6" height="25.6" rx="6.4" opacity="1"/>
  <rect class="cell" x="35.2" y="35.2" width="25.6" height="25.6" rx="6.4" opacity="0.75"/>
  <rect class="cell" x="67.2" y="35.2" width="25.6" height="25.6" rx="6.4" opacity="0.75"/>
  <rect class="cell" x="99.2" y="35.2" width="25.6" height="25.6" rx="6.4" opacity="0.3"/>

  <!-- Row 2 -->
  <rect class="cell" x="3.2" y="67.2" width="25.6" height="25.6" rx="6.4" opacity="1"/>
  <rect class="cell" x="35.2" y="67.2" width="25.6" height="25.6" rx="6.4" opacity="0.75"/>
  <rect class="cell" x="67.2" y="67.2" width="25.6" height="25.6" rx="6.4" opacity="0.3"/>
  <rect class="cell" x="99.2" y="67.2" width="25.6" height="25.6" rx="6.4" opacity="0.3"/>

  <!-- Row 3 (bottom) -->
  <rect class="cell" x="3.2" y="99.2" width="25.6" height="25.6" rx="6.4" opacity="1"/>
  <rect class="cell" x="35.2" y="99.2" width="25.6" height="25.6" rx="6.4" opacity="0.3"/>
  <rect class="cell" x="67.2" y="99.2" width="25.6" height="25.6" rx="6.4" opacity="0.3"/>
  <rect class="cell" x="99.2" y="99.2" width="25.6" height="25.6" rx="6.4" opacity="0.3"/>
</svg>
