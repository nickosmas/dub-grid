<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Navy cells: left column + center (form the D's vertical bar and hollow interior) -->
  <rect x="4" y="4" width="28" height="28" rx="6" fill="#1a35a0"/>
  <rect x="4" y="36" width="28" height="28" rx="6" fill="#1a35a0"/>
  <rect x="4" y="68" width="28" height="28" rx="6" fill="#1a35a0"/>
  <rect x="36" y="36" width="28" height="28" rx="6" fill="#1a35a0"/>
  <!-- Blue cells: form the D's arch -->
  <rect x="36" y="4" width="28" height="28" rx="6" fill="url(#blueGrad)"/>
  <rect x="68" y="4" width="28" height="28" rx="6" fill="url(#blueGrad)"/>
  <rect x="68" y="36" width="28" height="28" rx="6" fill="url(#blueGrad)"/>
  <rect x="36" y="68" width="28" height="28" rx="6" fill="url(#blueGrad)"/>
  <rect x="68" y="68" width="28" height="28" rx="6" fill="url(#blueGrad)"/>
</svg>
